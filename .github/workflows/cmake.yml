name: CMake Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        build_type: [Release, Debug]
      fail-fast: false

    steps:
      # Step 1: Checkout the code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install CMake
      - name: Install CMake
        if: matrix.os == 'windows-latest'
        run: |
          choco install cmake --no-progress --installargs 'ADD_CMAKE_TO_PATH=System' -y
          cmake --version
      - name: Install CMake
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake
          cmake --version
      - name: Install CMake
        if: matrix.os == 'macos-latest'
        run: |
          brew install cmake
          cmake --version

      # For Linux: Install Freetype for SDL_ttf
      - name: Install Freetype
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install libfreetype6-dev

      # For Linux: Install SDL3 and SDL_ttf build dependencies
      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            make \
            pkg-config \
            cmake \
            ninja-build \
            gnome-desktop-testing \
            libasound2-dev \
            libpulse-dev \
            libaudio-dev \
            libfribidi-dev \
            libjack-dev \
            libsndio-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxfixes-dev \
            libxi-dev \
            libxss-dev \
            libxtst-dev \
            libxkbcommon-dev \
            libdrm-dev \
            libgbm-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libegl1-mesa-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libudev-dev \
            libthai-dev \
            libfreetype6-dev \
            libwayland-dev \
            libdecor-0-dev \
            libpipewire-0.3-dev

      # Step 3: Configure Build
      - name: Configure Build
        run: |
          cmake -S . -B build/${{ matrix.build_type }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      # Step 4: Build
      - name: Build
        run: |
          cmake --build build/${{ matrix.build_type }} --config ${{ matrix.build_type }} --parallel

      # Step 6: Upload Artifacts
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}-${{ matrix.build_type }}-artifacts
          path: build/${{ matrix.build_type }}/*
